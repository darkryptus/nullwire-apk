name: Gradle Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      # Fix gradlew permission (IMPORTANT)
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Setup Gradle cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build project
      - name: Build with Gradle
        run: ./gradlew build

      # Publish package
      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
